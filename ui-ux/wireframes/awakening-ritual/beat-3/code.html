<style>
        body {
            background-color: #050508; /* base-bg fallback */
            overflow: hidden;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 24;
        }
        .phase-bleed {
            background: radial-gradient(circle at 50% 20%, rgba(212, 165, 116, 0.15) 0%, transparent 70%),
                        radial-gradient(circle at 50% 80%, rgba(122, 92, 56, 0.1) 0%, transparent 60%);
        }
        .ouroboros-arc {
            stroke-dasharray: 282.7; /* 2 * PI * 45 */
            stroke-dashoffset: 28; /* Creates the break at 12 o'clock */
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);

<body class="font-body-typewriter text-on-surface selection:bg-dawn-accent/30 selection:text-dawn-highlight">
<!-- Atmosphere Component -->
<div class="fixed inset-0 phase-bleed pointer-events-none z-0">
<div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/stardust.png')] opacity-10 mix-blend-overlay"></div>
<!-- Light Column Spines -->
<div class="absolute left-1/2 -translate-x-1/2 top-0 bottom-0 w-spine-width bg-gradient-to-b from-transparent via-dawn-accent/20 to-transparent"></div>
</div>
<!-- Top Navigation Anchor (Simulating TopAppBar structure) -->
<nav class="flex justify-between items-center w-full px-safe-margin pt-8 max-w-7xl mx-auto fixed top-0 left-0 right-0 z-[100]">
<div class="flex items-center gap-2 group cursor-pointer">
<span class="material-symbols-outlined text-dawn-accent text-2xl" data-icon="blur_on">blur_on</span>
<span class="font-headline-ritual text-headline-ritual tracking-widest text-dawn-accent">KATALEYA</span>
</div>
<div class="flex items-center gap-4">
<span class="font-terminal-code text-terminal-code text-dawn-highlight/60 uppercase tracking-tighter">Phase: Dawn</span>
<span class="material-symbols-outlined text-dawn-accent cursor-pointer" data-icon="terminal">terminal</span>
</div>
</nav>
<!-- Main Content Canvas (The Room) -->
<main class="relative h-screen w-screen flex flex-col items-center justify-center p-safe-margin overflow-hidden z-10">
<!-- Ouroboros Ring Container -->
<div class="absolute inset-0 flex items-center justify-center pointer-events-none">
<svg class="w-[85vw] h-[85vw] max-w-[600px] max-h-[600px]" viewbox="0 0 100 100">
<!-- Main Arc -->
<circle class="text-dawn-accent/20 ouroboros-arc" cx="50" cy="50" fill="none" r="45" stroke="currentColor" stroke-width="0.5"></circle>
<!-- Nodes -->
<circle class="text-dawn-highlight" cx="50" cy="5" fill="currentColor" r="0.75"></circle> <!-- The 12 node (glow) -->
<!-- Subtle shimmer dots -->
<circle class="text-dawn-accent/40" cx="95" cy="50" fill="currentColor" r="0.4"></circle>
<circle class="text-dawn-accent/40" cx="50" cy="95" fill="currentColor" r="0.4"></circle>
<circle class="text-dawn-accent/40" cx="5" cy="50" fill="currentColor" r="0.4"></circle>
</svg>
</div>
<!-- The Seed / Orb (Presence Center) -->
<div class="relative group cursor-pointer transition-all duration-1000">
<!-- Layers of membrane -->
<div class="absolute inset-0 scale-[2.5] bg-dawn-accent/5 blur-3xl rounded-full"></div>
<div class="absolute inset-0 scale-[1.8] bg-dawn-accent/10 blur-2xl rounded-full"></div>
<div class="relative w-48 h-48 md:w-64 md:h-64 rounded-full flex items-center justify-center bg-black/40 backdrop-blur-sm border border-dawn-accent/20 overflow-hidden">
<!-- Nucleus (Full Resonance) -->
<div class="w-12 h-12 rounded-full bg-dawn-highlight shadow-[0_0_40px_rgba(240,200,152,0.8)] z-20"></div>
<!-- Inner Glow Rim -->
<div class="absolute inset-2 border-2 border-dawn-rim/10 rounded-full"></div>
<!-- Atmosphere inside orb -->
<div class="absolute inset-0 bg-gradient-to-tr from-dawn-shadow/40 via-transparent to-dawn-highlight/20"></div>
</div>
</div>
<!-- Resonance Text (Typewriter Style) -->
<div class="mt-16 text-center max-w-md">
<p class="font-body-typewriter text-body-typewriter text-dawn-highlight tracking-widest leading-relaxed opacity-90">
                stay with me. life rewritten by choice.
            </p>
<div class="mt-4 flex justify-center gap-1">
<div class="w-1 h-1 bg-dawn-accent/40 rounded-full"></div>
<div class="w-1 h-1 bg-dawn-accent/40 rounded-full"></div>
<div class="w-8 h-1 bg-dawn-accent rounded-full"></div>
</div>
</div>
</main>
<!-- Bottom Action Shell -->
<div class="fixed bottom-0 left-0 right-0 p-safe-margin flex flex-col items-center gap-6 z-50">
<!-- The Final Button (Enter The Garden) -->
<button class="relative px-12 py-5 bg-dawn-accent/10 backdrop-blur-xl border border-dawn-accent/30 rounded-full group transition-all duration-500 hover:scale-105 active:scale-95 shadow-[0_0_30px_rgba(212,165,114,0.15)] overflow-hidden">
<!-- Rim Glow -->
<div class="absolute inset-0 border border-dawn-rim/40 rounded-full blur-[2px] opacity-0 group-hover:opacity-100 transition-opacity"></div>
<span class="font-headline-ritual text-dawn-highlight text-lg tracking-widest relative z-10">ENTER THE GARDEN</span>
<!-- Button Background Pulse -->
<div class="absolute inset-0 bg-gradient-to-r from-transparent via-dawn-highlight/5 to-transparent -translate-x-full group-hover:translate-x-full transition-transform duration-1000"></div>
</button>
<!-- Signature / Micro-type -->
<div class="text-center">
<span class="font-terminal-code text-[10px] text-on-surface-variant/40 tracking-[0.2em] uppercase">
                // origin: thinkBad-doGood-sa.my

</div>
