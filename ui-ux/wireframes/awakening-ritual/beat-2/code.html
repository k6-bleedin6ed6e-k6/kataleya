<style>
        body {
            background-color: #050508;
            margin: 0;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        .grain-overlay {
            position: fixed;
            inset: 0;
            z-index: 50;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3%3Ffilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.04;
            mix-blend-mode: overlay;
        }

        .spine-gradient {
            background: linear-gradient(to bottom, transparent, #d4a574 20%, #d4a574 80%, transparent);
            box-shadow: 0 0 20px #d4a574;
        }

        .orb-membrane {
            background: radial-gradient(circle at center, #f0c898 0%, #d4a574 40%, #7a5c38 70%, transparent 100%);
            filter: blur(8px);
        }

        .orb-nucleus {
            background: radial-gradient(circle at center, #fdf0e0 0%, #f0c898 60%);
            box-shadow: 0 0 40px #f0c898, inset 0 0 10px #fdf0e0;
        }

        .mercury-pulse {
            width: 2px;
            height: 100vh;
            background: linear-gradient(180deg, transparent 0%, #d4a57444 20%, #fdf0e0 50%, #d4a57444 80%, transparent 100%);
            opacity: 0.6;
        }

        .phase-bleed {
            background: radial-gradient(circle at center, #1a1108 0%, #050508 70%);
        }

        @keyframes typewriter {
            from { width: 0; }
            to { width: 100%; }
        }

        .typewriter-text {
            display: inline-block;
            overflow: hidden;
            white-space: nowrap;
            border-right: 2px solid #d4a574;
            animation: typewriter 2s steps(40, end);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="dark font-body-typewriter text-body-typewriter selection:bg-dawn-accent/30">
<!-- Atmosphere Component (Shared Visual Token) -->
<div class="fixed inset-0 phase-bleed z-0 overflow-hidden">
<div class="absolute inset-0 opacity-20 flex justify-center">
<!-- The Spine: Mercury Caduceus Column -->
<div class="mercury-pulse shadow-[0_0_100px_rgba(212,165,116,0.2)]"></div>
</div>
<!-- Ambient Grain/Frequencies -->
<div class="grain-overlay"></div>
<!-- Edge Vignette -->
<div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-black opacity-60"></div>
</div>
<!-- Top Navigation Anchor (Shared Component Identity) -->
<header class="fixed top-0 left-0 right-0 z-50 flex justify-between items-center px-safe-margin pt-8 max-w-7xl mx-auto">
<div class="font-headline-ritual text-headline-ritual tracking-[0.2em] text-dawn-accent opacity-80">
            KATALEYA
        </div>
<div class="flex items-center space-x-6">
<span class="material-symbols-outlined text-dawn-accent/50 cursor-pointer hover:text-dawn-highlight transition-colors duration-500" data-icon="blur_on">blur_on</span>
<span class="material-symbols-outlined text-dawn-accent/50 cursor-pointer hover:text-dawn-highlight transition-colors duration-500" data-icon="terminal">terminal</span>
</div>
</header>
<!-- Main Canvas: The Spine & The Seed -->
<main class="relative z-10 h-screen w-full flex flex-col items-center justify-center pointer-events-none">
<!-- The Central Presence -->
<div class="relative flex items-center justify-center">
<!-- The Spine (Mercury Caduceus Pulse Behind) -->
<div class="absolute w-[2px] h-[1237px] bg-dawn-accent/10 blur-[1px]"></div>
<div class="absolute w-[1px] h-[1060px] bg-dawn-highlight/30"></div>
<!-- The Seed / Orb (Grown Beat 2) -->
<div class="relative w-48 h-48 md:w-64 md:h-64 flex items-center justify-center">
<!-- Layer 1: Haze -->
<div class="absolute inset-0 orb-membrane scale-150 opacity-30"></div>
<!-- Layer 2: Rim Glow -->
<div class="absolute inset-4 rounded-full border border-dawn-rim/20 shadow-[0_0_60px_rgba(212,165,116,0.3)]"></div>
<!-- Layer 3: Body -->
<div class="absolute inset-12 rounded-full orb-membrane opacity-80"></div>
<!-- Layer 4: Nucleus -->
<div class="absolute inset-[38%] rounded-full orb-nucleus z-20"></div>
<!-- Floating Nodes / Frequency Markers (..: :..) -->
<div class="absolute -left-12 top-1/2 -translate-y-1/2 flex flex-col space-y-1 opacity-40">
<div class="w-1 h-1 rounded-full bg-dawn-highlight"></div>
<div class="w-1 h-1 rounded-full bg-dawn-highlight"></div>
</div>
<div class="absolute -right-12 top-1/2 -translate-y-1/2 flex flex-col space-y-1 opacity-40">
<div class="w-1 h-1 rounded-full bg-dawn-highlight"></div>
<div class="w-1 h-1 rounded-full bg-dawn-highlight"></div>
</div>
</div>
</div>
<!-- Onboarding Communication -->
<div class="mt-24 max-w-md text-center px-safe-margin pointer-events-auto">
<div class="mb-2 font-terminal-code text-terminal-code text-dawn-accent/40 tracking-widest uppercase">
                Fortress Integrity: Active
            </div>
<div class="typewriter-text text-dawn-highlight font-body-typewriter text-lg md:text-xl">
                this is your fortress. no cloud, no spying. just intention.
            </div>
<div class="mt-12 flex flex-col items-center space-y-4 opacity-0 animate-[fadeIn_2s_ease-out_2s_forwards]">
<div class="w-[1px] h-12 bg-gradient-to-b from-dawn-accent to-transparent"></div>
<div class="text-dawn-accent/60 font-terminal-code text-xs tracking-widest flex items-center">
<span class="mr-2">..:</span> SWIPE UP TO SEAL <span class="ml-2">:..</span>
</div>
</div>
</div>
</main>
<!-- Bottom Context (Circadian Phase Indicator) -->
<footer class="fixed bottom-0 left-0 right-0 p-safe-margin z-50 flex justify-between items-end pointer-events-none">
<div class="flex flex-col space-y-1">
<span class="font-terminal-code text-xs text-dawn-accent/30">CIRCADIAN PHASE</span>
<span class="font-headline-ritual text-dawn-accent text-lg">DAWN</span>
</div>
<div class="flex flex-col items-end space-y-1">
<span class="font-terminal-code text-xs text-dawn-accent/30">RESONANCE</span>
<span class="font-headline-ritual text-dawn-accent text-lg">98%</span>
</div>
</footer>
<!-- Ritual Interaction Layer (Invisible Gesture Target) -->
<div class="fixed inset-0 z-40 pointer-events-auto cursor-ns-resize"></div>
<style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .animate-pulse-slow {
            animation: pulse-slow 8s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse-slow {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.05); }
        }
    </style>
</body></html>
