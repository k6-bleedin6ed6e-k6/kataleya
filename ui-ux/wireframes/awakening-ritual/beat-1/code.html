<div class="fixed inset-0 z-0 overflow-hidden bg-base-bg">

<!-- Membrane Layers -->
<div class="w-24 h-24 rounded-full bg-dawn-accent/5 blur-3xl absolute -inset-8 opacity-40"></div>
<div class="w-16 h-16 rounded-full bg-dawn-accent/10 blur-xl absolute -inset-4 opacity-60"></div>

<div class="w-full h-full bg-gradient-to-tr from-dawn-accent to-dawn-highlight opacity-40"></div>
</div>
<!-- Rim Glow -->
<div class="absolute inset-0 rounded-full border border-dawn-rim/5 scale-150"></div>
</div>

<p class="font-body-typewriter text-body-typewriter text-on-surface-variant/70 tracking-[0.2em] lowercase leading-relaxed">
                the garden is empty. it waits for your choice.
            </p>
</div>

            </span>
<div class="w-spine-width h-12 bg-gradient-to-t from-dawn-accent/40 to-transparent"></div>
</div>
</main>
